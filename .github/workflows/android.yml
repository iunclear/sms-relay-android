name: Build and Release Android APK

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  VERSION_NAME: 1.1.1

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - uses: gradle/actions/setup-gradle@v4
      - name: Prepare stable signing key
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          test -n "$ANDROID_KEYSTORE_BASE64"
          test -n "$ANDROID_KEYSTORE_PASSWORD"
          test -n "$ANDROID_KEY_ALIAS"
          test -n "$ANDROID_KEY_PASSWORD"
          printf '%s' "$ANDROID_KEYSTORE_BASE64" | base64 --decode > "$RUNNER_TEMP/smsrelay-release.jks"
          chmod 600 "$RUNNER_TEMP/smsrelay-release.jks"
          {
            echo "SMSRELAY_KEYSTORE_FILE=$RUNNER_TEMP/smsrelay-release.jks"
            echo "SMSRELAY_KEYSTORE_PASSWORD=$ANDROID_KEYSTORE_PASSWORD"
            echo "SMSRELAY_KEY_ALIAS=$ANDROID_KEY_ALIAS"
            echo "SMSRELAY_KEY_PASSWORD=$ANDROID_KEY_PASSWORD"
          } >> "$GITHUB_ENV"
      - name: Build APKs
        env:
          SMSRELAY_REQUIRE_RELEASE_SIGNING: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
        run: ./gradlew assembleDebug assembleRelease
      - name: Prepare release files
        run: |
          mkdir -p dist
          cp app/build/outputs/apk/debug/app-debug.apk "dist/SmsRelay-v${VERSION_NAME}-debug.apk"
          cp app/build/outputs/apk/release/app-release.apk "dist/SmsRelay-v${VERSION_NAME}-optimized.apk"
      - name: Upload APKs
        uses: actions/upload-artifact@v4
        with:
          name: SmsRelay-v${{ env.VERSION_NAME }}-apks
          path: dist/*.apk
          if-no-files-found: error
      - name: Publish GitHub Release
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          tag="v${VERSION_NAME}"
          if gh release view "$tag" >/dev/null 2>&1; then
            gh release upload "$tag" dist/*.apk --clobber
          else
            gh release create "$tag" dist/*.apk --title "SmsRelay $tag" --generate-notes
          fi
